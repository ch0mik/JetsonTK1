name: Jetson TK1 OS Factory

on:
  workflow_dispatch:

jobs:
  build-rootfs:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          qemu-user-static binfmt-support debootstrap \
          wget rsync e2fsprogs dosfstools \
          device-tree-compiler parted

    - name: Download L4T 21.8
      run: |
        wget -q https://developer.download.nvidia.com/embedded/L4T/r21_Release_v8.0/Tegra_Linux_R21.8.0_armhf.tbz2
        wget -q https://developer.download.nvidia.com/embedded/L4T/r21_Release_v8.0/Tegra_Linux_Sample-Root-Filesystem_R21.8.0_armhf.tbz2
        tar xjf Tegra_Linux_R21.8.0_armhf.tbz2

    - name: Extract L4T rootfs
      run: |
        cd Linux_for_Tegra/rootfs
        sudo tar xjf ../../Tegra_Linux_Sample-Root-Filesystem_R21.8.0_armhf.tbz2
        cd ..
        sudo ./apply_binaries.sh

    - name: Build Debian 12 rootfs
      run: |
        sudo mkdir debian-rootfs
        sudo debootstrap --arch=armhf bookworm debian-rootfs http://deb.debian.org/debian
        sudo cp /usr/bin/qemu-arm-static debian-rootfs/usr/bin/

    - name: Configure Debian
      run: |
        sudo chroot debian-rootfs /bin/bash -c "
          echo 'jetson-tk1' > /etc/hostname
          cat > /etc/apt/sources.list <<EOF
          deb http://deb.debian.org/debian bookworm main contrib non-free non-free-firmware
          deb http://security.debian.org/debian-security bookworm-security main contrib non-free non-free-firmware
          EOF
          apt-get update
          apt-get install -y locales sudo net-tools iproute2 openssh-server ca-certificates \
            ocl-icd-libopencl1 curl gnupg
          locale-gen en_US.UTF-8
        "

    - name: Install Docker CE
      run: |
        sudo chroot debian-rootfs /bin/bash -c "
          install -m 0755 -d /etc/apt/keyrings
          curl -fsSL https://download.docker.com/linux/debian/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
          echo 'deb [arch=armhf signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/debian bookworm stable' \
            > /etc/apt/sources.list.d/docker.list
          apt-get update
          apt-get install -y docker-ce docker-ce-cli containerd.io
        "

    - name: Inject Tegra drivers and CUDA 6.5
      run: |
        sudo rsync -av Linux_for_Tegra/rootfs/usr/lib/arm-linux-gnueabihf/tegra/ debian-rootfs/usr/lib/arm-linux-gnueabihf/tegra/
        sudo rsync -av Linux_for_Tegra/rootfs/lib/firmware/ debian-rootfs/lib/firmware/
        sudo rsync -av Linux_for_Tegra/rootfs/lib/modules/ debian-rootfs/lib/modules/
        sudo rsync -av Linux_for_Tegra/rootfs/usr/local/cuda-6.5 debian-rootfs/usr/local/

    - name: Build rootfs.ext4
      run: |
        dd if=/dev/zero of=rootfs.ext4 bs=1M count=4096
        mkfs.ext4 rootfs.ext4
        mkdir mnt
        sudo mount -o loop rootfs.ext4 mnt
        sudo rsync -av debian-rootfs/ mnt/
        sudo umount mnt

    - name: Upload rootfs
      uses: actions/upload-artifact@v4
      with:
        name: rootfs
        path: rootfs.ext4

  build-image:
    runs-on: ubuntu-latest
    needs: build-rootfs

    steps:
    - name: Download rootfs
      uses: actions/download-artifact@v4
      with:
        name: rootfs

    - name: Download L4T 21.8 (kernel/DTB)
      run: |
        wget -q https://developer.download.nvidia.com/embedded/L4T/r21_Release_v8.0/Tegra_Linux_R21.8.0_armhf.tbz2
        tar xjf Tegra_Linux_R21.8.0_armhf.tbz2

    - name: Create boot partition image
      run: |
        dd if=/dev/zero of=boot.vfat bs=1M count=128
        mkfs.vfat boot.vfat
        mkdir bootmnt
        sudo mount -o loop boot.vfat bootmnt

        sudo cp Linux_for_Tegra/bootloader/zImage bootmnt/
        sudo cp Linux_for_Tegra/kernel/dtb/tegra124-jetson-tk1.dtb bootmnt/

        sudo bash -c "cat > bootmnt/extlinux.conf << 'EOF'
        DEFAULT jetson
        LABEL jetson
            LINUX /zImage
            FDT /tegra124-jetson-tk1.dtb
            APPEND console=ttyS0,115200 root=/dev/mmcblk0p2 rw rootwait
        EOF
        "

        sudo umount bootmnt


    - name: Build full disk image
      run: |
        dd if=/dev/zero of=jetson-tk1.img bs=1M count=4352
        parted jetson-tk1.img --script -- mklabel msdos
        parted jetson-tk1.img --script -- mkpart primary fat32 1MiB 129MiB
        parted jetson-tk1.img --script -- mkpart primary ext4 129MiB 100%
        LOOP=$(sudo losetup -f --show jetson-tk1.img)
        sudo partprobe $LOOP
        sudo dd if=boot.vfat of=${LOOP}p1
        sudo dd if=rootfs.ext4 of=${LOOP}p2
        sudo losetup -d $LOOP

    - name: Upload image
      uses: actions/upload-artifact@v4
      with:
        name: jetson-tk1-image
        path: jetson-tk1.img

  release:
    runs-on: ubuntu-latest
    needs: build-image

    steps:
    - name: Download image
      uses: actions/download-artifact@v4
      with:
        name: jetson-tk1-image

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: tk1-l4t21.8-debian12
        name: Jetson TK1 Hybrid OS (Debian 12 + L4T 21.8 + CUDA 6.5 + Docker)
        files: |
          jetson-tk1.img
