name: Jetson TK1 OS Factory - Mainline

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: Mainline LTS kernel version
        required: true
        default: 6.12.95
        type: string
      rootfs_size_mib:
        description: Initial ext4 rootfs size in MiB (minimum 14336; grows on first boot)
        required: true
        default: "14336"
        type: string
      release_tag:
        description: Optional release tag (generated when empty)
        required: false
        type: string
      publish_release:
        description: Publish the result as a GitHub Release
        required: true
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: tk1-mainline-${{ github.ref }}
  cancel-in-progress: false

env:
  DEBIAN_FRONTEND: noninteractive
  KERNEL_VERSION: ${{ inputs.kernel_version }}
  ROOTFS_SIZE_MIB: ${{ inputs.rootfs_size_mib }}

jobs:
  build:
    name: Build Debian and mainline image
    runs-on: ubuntu-24.04
    timeout-minutes: 330

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            binfmt-support qemu-user-static debootstrap \
            gcc-arm-linux-gnueabihf binutils-arm-linux-gnueabihf \
            bc bison build-essential flex libssl-dev libelf-dev \
            device-tree-compiler rsync e2fsprogs parted xz-utils curl

      - name: Build Debian 12 armhf rootfs
        run: sudo bash ./scripts/build-rootfs.sh rootfs mainline

      - name: Download and verify kernel source
        run: |
          set -Eeuo pipefail
          [[ "$KERNEL_VERSION" =~ ^6\.12\.[0-9]+$ ]] || {
            echo "kernel_version must be a 6.12.x release" >&2
            exit 1
          }
          base_url=https://cdn.kernel.org/pub/linux/kernel/v6.x
          archive="linux-${KERNEL_VERSION}.tar.xz"
          curl --fail --location --retry 3 --remote-name "$base_url/$archive"
          curl --fail --location --retry 3 --output sha256sums.asc \
            "$base_url/sha256sums.asc"
          grep "  $archive$" sha256sums.asc | sha256sum --check --strict
          tar -xf "$archive"

      - name: Configure and build mainline kernel
        run: |
          set -Eeuo pipefail
          cd "linux-${KERNEL_VERSION}"
          make ARCH=arm CROSS_COMPILE=arm-linux-gnueabihf- tegra_defconfig
          scripts/kconfig/merge_config.sh -m .config \
            ../scripts/config/kernel-docker.fragment
          make ARCH=arm CROSS_COMPILE=arm-linux-gnueabihf- olddefconfig

          for option in \
            CONFIG_CGROUPS CONFIG_NAMESPACES CONFIG_NET_NS CONFIG_SECCOMP \
            CONFIG_EXT4_FS CONFIG_SCSI CONFIG_BLK_DEV_SD CONFIG_ATA \
            CONFIG_SATA_AHCI CONFIG_AHCI_TEGRA CONFIG_R8169 CONFIG_DRM_TEGRA \
            CONFIG_DRM_TEGRA_STAGING CONFIG_NOUVEAU_PLATFORM_DRIVER \
            CONFIG_FW_LOADER CONFIG_HAMRADIO CONFIG_AX25_DAMA_SLAVE \
            CONFIG_WLAN CONFIG_WLAN_VENDOR_REALTEK CONFIG_MAC80211_MESH \
            CONFIG_BATMAN_ADV_BATMAN_V CONFIG_BATMAN_ADV_BLA \
            CONFIG_BATMAN_ADV_DAT CONFIG_BATMAN_ADV_MCAST \
            CONFIG_USB_SERIAL_GENERIC CONFIG_SOUND CONFIG_SND CONFIG_SND_USB; do
            grep -q "^${option}=y$" .config
          done
          for option in \
            CONFIG_OVERLAY_FS CONFIG_BRIDGE CONFIG_VETH CONFIG_DRM_NOUVEAU \
            CONFIG_AX25 CONFIG_MKISS CONFIG_6PACK CONFIG_BPQETHER \
            CONFIG_CFG80211 CONFIG_MAC80211 CONFIG_BATMAN_ADV \
            CONFIG_VLAN_8021Q CONFIG_RTL8187 CONFIG_RTL8XXXU \
            CONFIG_RTW88_8822BU CONFIG_RTW88_8822CU CONFIG_RTW88_8723DU \
            CONFIG_RTW88_8821CU CONFIG_VFAT_FS CONFIG_EXFAT_FS \
            CONFIG_NTFS3_FS CONFIG_FUSE_FS CONFIG_USB_STORAGE \
            CONFIG_USB_STORAGE_REALTEK CONFIG_USB_UAS \
            CONFIG_USB_ACM CONFIG_USB_SERIAL CONFIG_USB_SERIAL_FTDI_SIO \
            CONFIG_USB_SERIAL_PL2303 CONFIG_USB_SERIAL_CP210X \
            CONFIG_USB_SERIAL_CH341 CONFIG_SND_USB_AUDIO \
            CONFIG_MEDIA_SUPPORT CONFIG_VIDEO_DEV CONFIG_DVB_CORE \
            CONFIG_DVB_USB_RTL28XXU CONFIG_DVB_RTL2832_SDR; do
            grep -Eq "^${option}=(y|m)$" .config
          done

          make ARCH=arm CROSS_COMPILE=arm-linux-gnueabihf- -j"$(nproc)" \
            zImage dtbs modules
          kernel_release=$(make -s ARCH=arm CROSS_COMPILE=arm-linux-gnueabihf- kernelrelease)
          echo "KERNEL_RELEASE=$kernel_release" >> "$GITHUB_ENV"
          sudo make ARCH=arm CROSS_COMPILE=arm-linux-gnueabihf- \
            INSTALL_MOD_PATH="$GITHUB_WORKSPACE/rootfs" INSTALL_MOD_STRIP=1 \
            modules_install
          sudo install -m 0644 .config \
            "$GITHUB_WORKSPACE/rootfs/boot/config-$kernel_release"
          sudo install -m 0644 System.map \
            "$GITHUB_WORKSPACE/rootfs/boot/System.map-$kernel_release"

          dtb=$(find arch/arm/boot/dts -type f -name tegra124-jetson-tk1.dtb -print -quit)
          test -n "$dtb"
          mkdir -p "$GITHUB_WORKSPACE/kernel-out"
          cp arch/arm/boot/zImage "$GITHUB_WORKSPACE/kernel-out/zImage"
          cp "$dtb" "$GITHUB_WORKSPACE/kernel-out/tegra124-jetson-tk1.dtb"

      - name: Finalize rootfs and create images
        env:
          PUBLISH_RELEASE: ${{ inputs.publish_release }}
          REQUESTED_TAG: ${{ inputs.release_tag }}
        run: |
          tag=${REQUESTED_TAG:-tk1-mainline-${KERNEL_VERSION}-r${GITHUB_RUN_NUMBER}}
          PXE_GITHUB_ROOTFS_URL=
          if [[ "$PUBLISH_RELEASE" == true ]]; then
            PXE_GITHUB_ROOTFS_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${tag}/jetson-tk1-mainline-debian12-rootfs.ext4.xz"
          fi
          export PXE_GITHUB_ROOTFS_URL
          sudo bash ./scripts/finalize-rootfs.sh rootfs "$KERNEL_RELEASE"
          sudo --preserve-env=GITHUB_SHA,GITHUB_RUN_ID,ROOTFS_SIZE_MIB,PXE_GITHUB_ROOTFS_URL \
            bash ./scripts/build-image.sh \
              rootfs mainline kernel-out/zImage \
              kernel-out/tegra124-jetson-tk1.dtb \
              "$KERNEL_RELEASE" release
          sudo chown -R "$USER:$USER" release

      - name: Verify release payload
        env:
          PUBLISH_RELEASE: ${{ inputs.publish_release }}
          REQUESTED_TAG: ${{ inputs.release_tag }}
        run: |
          set -Eeuo pipefail
          cd release
          sha256sum --check SHA256SUMS
          test "$(find . -maxdepth 1 -name '*-boot-sd.img.xz' | wc -l)" -eq 1
          test "$(find . -maxdepth 1 -name '*-rootfs.ext4.xz' | wc -l)" -eq 1
          test "$(find . -maxdepth 1 -name '*-boot.ext2.xz' | wc -l)" -eq 1
          test "$(find . -maxdepth 1 -name '*-pxe.tar.xz' | wc -l)" -eq 1
          tar -tf ./*-boot-files.tar.xz | grep -F './boot/extlinux/extlinux.conf' >/dev/null
          xzcat ./*-boot-files.tar.xz | tar -xOf - ./boot/extlinux/extlinux.conf | \
            grep -F 'root=/dev/sda1' >/dev/null
          for path in \
            ./pxe ./pxelinux.cfg/default \
            ./jetson-tk1-mainline-debian12/zImage \
            ./jetson-tk1-mainline-debian12/initrd.img \
            ./jetson-tk1-mainline-debian12/tegra124-jetson-tk1.dtb \
            ./jetson-tk1-mainline-debian12/manifest.txt \
            ./jetson-tk1-mainline-debian12/rootfs.sha256; do
            tar -tf ./*-pxe.tar.xz | grep -Fx "$path" >/dev/null
          done
          pxe_config=$(tar -xOf ./*-pxe.tar.xz ./pxelinux.cfg/default)
          grep -F 'root=/dev/sda1' <<<"$pxe_config" >/dev/null
          grep -F 'LABEL install-rootfs-local' <<<"$pxe_config" >/dev/null
          grep -F 'tk1_installer=1' <<<"$pxe_config" >/dev/null
          tag=${REQUESTED_TAG:-tk1-mainline-${KERNEL_VERSION}-r${GITHUB_RUN_NUMBER}}
          local_url='http://${serverip}:8080/jetson-tk1-mainline-debian12-rootfs.ext4.xz'
          grep -F "tk1_installer_url=$local_url" <<<"$pxe_config" >/dev/null
          if [[ "$PUBLISH_RELEASE" == true ]]; then
            github_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${tag}/jetson-tk1-mainline-debian12-rootfs.ext4.xz"
            grep -F 'LABEL install-rootfs-github' <<<"$pxe_config" >/dev/null
            grep -F "tk1_installer_url=$github_url" <<<"$pxe_config" >/dev/null
          else
            ! grep -F 'LABEL install-rootfs-github' <<<"$pxe_config" >/dev/null
          fi
          grep -Eq 'tk1_installer_sha256=[0-9a-f]{64}' <<<"$pxe_config"
          rootfs_sha256=$(sha256sum ./*-rootfs.ext4.xz | awk '{print $1}')
          grep -F "tk1_installer_sha256=$rootfs_sha256" \
            <<<"$pxe_config" >/dev/null
          test "$(tar -xOf ./*-pxe.tar.xz \
            ./jetson-tk1-mainline-debian12/rootfs.sha256 | awk '{print $1}')" = \
            "$rootfs_sha256"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: jetson-tk1-mainline-debian12
          path: release/*
          if-no-files-found: error
          compression-level: 0
          retention-days: 14

  release:
    name: Publish GitHub Release
    if: ${{ inputs.publish_release }}
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Download workflow artifact
        uses: actions/download-artifact@v7
        with:
          name: jetson-tk1-mainline-debian12
          path: release

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          REQUESTED_TAG: ${{ inputs.release_tag }}
        run: |
          set -Eeuo pipefail
          tag=${REQUESTED_TAG:-tk1-mainline-${KERNEL_VERSION}-r${GITHUB_RUN_NUMBER}}
          title="Jetson TK1 Mainline ${KERNEL_VERSION} + Debian 12"
          notes=$(cat <<EOF
          Mainline Linux ${KERNEL_VERSION}, Nouveau/Mesa, Docker CE and Debian 12 armhf.
          Includes SATA rootfs, SD/eMMC boot and PXE/TFTP deployment assets.

          Verify the download with \`sha256sum -c SHA256SUMS\` before flashing.
          See README.md for bootloader requirements and first-login instructions.
          EOF
          )
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$tag" release/* --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$tag" release/* \
              --repo "$GITHUB_REPOSITORY" --target "$GITHUB_SHA" \
              --title "$title" --notes "$notes"
          fi
