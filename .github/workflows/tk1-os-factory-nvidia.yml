name: Jetson TK1 OS Factory - NVIDIA L4T

on:
  workflow_dispatch:
    inputs:
      rootfs_size_mib:
        description: Initial ext4 rootfs size in MiB (minimum 14336; grows on first boot)
        required: true
        default: "14336"
        type: string
      release_tag:
        description: Optional release tag (generated when empty)
        required: false
        type: string
      publish_release:
        description: Publish the result as a GitHub Release
        required: true
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: tk1-nvidia-${{ github.ref }}
  cancel-in-progress: false

env:
  DEBIAN_FRONTEND: noninteractive
  L4T_VERSION: R21.8
  L4T_ARCHIVE: Tegra124_Linux_R21.8.0_armhf.tbz2
  L4T_SHA1: 5a1ebb2cc1f851ef36baa19736500588efeb9756
  ROOTFS_SIZE_MIB: ${{ inputs.rootfs_size_mib }}

jobs:
  build:
    name: Build Debian and NVIDIA L4T image
    runs-on: ubuntu-24.04
    timeout-minutes: 330

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            binfmt-support qemu-user-static debootstrap \
            bzip2 curl rsync e2fsprogs parted xz-utils

      - name: Build Debian 12 armhf rootfs
        run: sudo bash ./scripts/build-rootfs.sh rootfs nvidia

      - name: Download and verify NVIDIA L4T 21.8
        run: |
          set -Eeuo pipefail
          url="https://developer.download.nvidia.com/embedded/L4T/r21_Release_v8.0/release_files/$L4T_ARCHIVE"
          curl --fail --location --retry 3 --output "$L4T_ARCHIVE" "$url"
          echo "$L4T_SHA1  $L4T_ARCHIVE" | sha1sum --check --strict
          tar -xjf "$L4T_ARCHIVE"

      - name: Install NVIDIA drivers and CUDA 6.5
        run: |
          sudo bash ./scripts/install-nvidia-userspace.sh rootfs Linux_for_Tegra
          zimage=Linux_for_Tegra/kernel/zImage
          dtb=Linux_for_Tegra/kernel/dtb/tegra124-jetson_tk1-pm375-000-c00-00.dtb
          test -s "$zimage"
          test -s "$dtb"
          mkdir -p kernel-out
          cp "$zimage" kernel-out/zImage
          cp "$dtb" kernel-out/tegra124-jetson-tk1.dtb

          kernel_dir=$(find rootfs/lib/modules -mindepth 1 -maxdepth 1 \
            -type d -name '3.10*' -print -quit)
          test -n "$kernel_dir"
          kernel_release=${kernel_dir##*/}
          echo "KERNEL_RELEASE=$kernel_release" >> "$GITHUB_ENV"

      - name: Finalize rootfs and create images
        env:
          PUBLISH_RELEASE: ${{ inputs.publish_release }}
          REQUESTED_TAG: ${{ inputs.release_tag }}
        run: |
          tag=${REQUESTED_TAG:-tk1-nvidia-l4t21.8-r${GITHUB_RUN_NUMBER}}
          PXE_GITHUB_ROOTFS_URL=
          if [[ "$PUBLISH_RELEASE" == true ]]; then
            PXE_GITHUB_ROOTFS_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${tag}/jetson-tk1-nvidia-debian12-rootfs.ext4.xz"
          fi
          export PXE_GITHUB_ROOTFS_URL
          sudo bash ./scripts/finalize-rootfs.sh rootfs "$KERNEL_RELEASE"
          sudo --preserve-env=GITHUB_SHA,GITHUB_RUN_ID,ROOTFS_SIZE_MIB,PXE_GITHUB_ROOTFS_URL \
            bash ./scripts/build-image.sh \
              rootfs nvidia kernel-out/zImage \
              kernel-out/tegra124-jetson-tk1.dtb \
              "$KERNEL_RELEASE" release
          sudo chown -R "$USER:$USER" release

      - name: Verify release payload
        env:
          PUBLISH_RELEASE: ${{ inputs.publish_release }}
          REQUESTED_TAG: ${{ inputs.release_tag }}
        run: |
          set -Eeuo pipefail
          cd release
          sha256sum --check SHA256SUMS
          test "$(find . -maxdepth 1 -name '*-boot-sd.img.xz' | wc -l)" -eq 1
          test "$(find . -maxdepth 1 -name '*-rootfs.ext4.xz' | wc -l)" -eq 1
          test "$(find . -maxdepth 1 -name '*-boot.ext2.xz' | wc -l)" -eq 1
          test "$(find . -maxdepth 1 -name '*-pxe.tar.xz' | wc -l)" -eq 1
          tar -tf ./*-boot-files.tar.xz | grep -F './boot/extlinux/extlinux.conf' >/dev/null
          xzcat ./*-boot-files.tar.xz | tar -xOf - ./boot/extlinux/extlinux.conf | \
            grep -F 'root=/dev/sda1' >/dev/null
          xzcat ./*-boot-files.tar.xz | tar -xOf - ./boot/extlinux/extlinux.conf | \
            grep -F 'mem=2015M@2048M' >/dev/null
          for path in \
            ./pxe ./pxelinux.cfg/default \
            ./jetson-tk1-nvidia-debian12/zImage \
            ./jetson-tk1-nvidia-debian12/initrd.img \
            ./jetson-tk1-nvidia-debian12/tegra124-jetson-tk1.dtb \
            ./jetson-tk1-nvidia-debian12/manifest.txt \
            ./jetson-tk1-nvidia-debian12/rootfs.sha256; do
            tar -tf ./*-pxe.tar.xz | grep -Fx "$path" >/dev/null
          done
          pxe_config=$(tar -xOf ./*-pxe.tar.xz ./pxelinux.cfg/default)
          grep -F 'root=/dev/sda1' <<<"$pxe_config" >/dev/null
          grep -F 'mem=2015M@2048M' <<<"$pxe_config" >/dev/null
          grep -F 'LABEL install-rootfs-local' <<<"$pxe_config" >/dev/null
          grep -F 'tk1_installer=1' <<<"$pxe_config" >/dev/null
          tag=${REQUESTED_TAG:-tk1-nvidia-l4t21.8-r${GITHUB_RUN_NUMBER}}
          local_url='http://${serverip}:8080/jetson-tk1-nvidia-debian12-rootfs.ext4.xz'
          grep -F "tk1_installer_url=$local_url" <<<"$pxe_config" >/dev/null
          if [[ "$PUBLISH_RELEASE" == true ]]; then
            github_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${tag}/jetson-tk1-nvidia-debian12-rootfs.ext4.xz"
            grep -F 'LABEL install-rootfs-github' <<<"$pxe_config" >/dev/null
            grep -F "tk1_installer_url=$github_url" <<<"$pxe_config" >/dev/null
          else
            ! grep -F 'LABEL install-rootfs-github' <<<"$pxe_config" >/dev/null
          fi
          grep -Eq 'tk1_installer_sha256=[0-9a-f]{64}' <<<"$pxe_config"
          rootfs_sha256=$(sha256sum ./*-rootfs.ext4.xz | awk '{print $1}')
          grep -F "tk1_installer_sha256=$rootfs_sha256" \
            <<<"$pxe_config" >/dev/null
          test "$(tar -xOf ./*-pxe.tar.xz \
            ./jetson-tk1-nvidia-debian12/rootfs.sha256 | awk '{print $1}')" = \
            "$rootfs_sha256"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: jetson-tk1-nvidia-debian12
          path: release/*
          if-no-files-found: error
          compression-level: 0
          retention-days: 14

  release:
    name: Publish GitHub Release
    if: ${{ inputs.publish_release }}
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Download workflow artifact
        uses: actions/download-artifact@v7
        with:
          name: jetson-tk1-nvidia-debian12
          path: release

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          REQUESTED_TAG: ${{ inputs.release_tag }}
        run: |
          set -Eeuo pipefail
          tag=${REQUESTED_TAG:-tk1-nvidia-l4t21.8-r${GITHUB_RUN_NUMBER}}
          title="Jetson TK1 NVIDIA L4T 21.8 + Debian 12"
          notes=$(cat <<'EOF'
          NVIDIA kernel 3.10.40, proprietary Tegra drivers, CUDA 6.5,
          Docker CE and Debian 12 armhf. NVIDIA OpenCL is not available on TK1.
          Includes SATA rootfs, SD/eMMC boot and PXE/TFTP deployment assets.

          This is an experimental hybrid userspace. Verify the download with
          `sha256sum -c SHA256SUMS` and read README.md before flashing.
          EOF
          )
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$tag" release/* --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$tag" release/* \
              --repo "$GITHUB_REPOSITORY" --target "$GITHUB_SHA" \
              --title "$title" --notes "$notes"
          fi
